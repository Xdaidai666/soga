name: Publish Docker Image

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/docker-image.yml'
      - 'docker/Dockerfile.ghcr'
      - 'soga-2.13.7-linux-amd64.tar.gz'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/xdaidai666/soga
          tags: |
            type=raw,value=2.13.7
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=soga
            org.opencontainers.image.description=Patched soga 2.13.7 amd64 image
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.ghcr
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
